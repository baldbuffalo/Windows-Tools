name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: |
          dotnet publish WindowsTools/WindowsTools.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishReadyToRun=true `
            -o ./output

      - name: Move latest tag
        shell: bash
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git tag -f latest ${{ github.sha }}
          git push origin -f refs/tags/latest

      - name: Clear old release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view latest --json assets --jq '.assets[].name' 2>/dev/null \
            | xargs -I{} gh release delete-asset latest {} --yes 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Windows Tools (Latest)
          draft: false
          prerelease: false
          files: ./output/WindowsTools.exe
          generate_release_notes: false
          body: |
            ## Windows Tools

            Self-contained single EXE — no .NET install required, no extraction needed.

            **Install:** download `WindowsTools.exe` and run it. It installs itself
            and adds a **shortcut to your desktop**, then opens automatically.

            **Features:**
            - Storage Checker: view all drives, used/free space, color-coded usage bars
            - Driver Hub: auto-detects CPU/GPU/OEM and installs manufacturer apps silently
