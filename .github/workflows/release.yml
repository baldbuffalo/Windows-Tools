name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: |
          dotnet publish WindowsTools/WindowsTools.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:PublishReadyToRun=true `
            -o ./output

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Windows Tools (Latest)
          draft: false
          prerelease: false
          files: ./output/WindowsTools.exe
          generate_release_notes: false
          body: |
            ## Windows Tools

            Self-contained single-file executable — no .NET install required.

            **Features:**
            - Storage Checker: view all drives, used/free space, color-coded usage bars
            - Driver Hub: auto-detects CPU/GPU/OEM and installs manufacturer apps via winget
